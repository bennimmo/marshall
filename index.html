<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Scanner</title>
  <!-- Import the HTML5 QR Code library -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --bg: #f8fafc;
      --text: #1e293b;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .header {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    select {
      padding: 1rem;
      font-size: 1.1rem;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      background-color: white;
      width: 100%;
    }
    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    /* Customising the injected scanner UI */
    #reader button {
      padding: 10px 15px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      margin-top: 10px;
    }
    /* Notification Overlay */
    #notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--success);
      color: white;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.2rem;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 1000;
    }
    #notification.show {
      opacity: 1;
    }
    /* Loading Overlay */
    #loading {
      position: fixed;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.85);
      color: white;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      z-index: 1100;
      backdrop-filter: blur(2px);
    }
    #loading.show {
      display: flex;
    }
    #loading .spinner {
      width: 64px;
      height: 64px;
      border: 6px solid rgba(255, 255, 255, 0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #loading .label {
      font-size: 1.25rem;
      font-weight: bold;
      letter-spacing: 0.02em;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="notification">✅ Checked in: <span id="notif-name"></span></div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="label">Checking in…</div>
  </div>

  <div class="container">
    <div class="header">
      <h2>Marshal Scanner</h2>
    </div>

    <div class="control-group">
      <label for="waypoint">Select Waypoint:</label>
      <select id="waypoint">
        <option value="">Loading waypoints...</option>
      </select>
    </div>

    <!-- NEW: A dedicated button to request permissions -->
    <button id="start-btn" style="padding: 15px; font-size: 1.2rem; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold;">
      📷 Tap to Start Scanner
    </button>

    <div id="reader"></div>

    <button id="diag-btn" style="padding: 10px; font-size: 0.9rem; background-color: #64748b; color: white; border: none; border-radius: 8px;">
      🔧 Run camera diagnostics
    </button>
    <pre id="diag-out" style="white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; padding: 0.75rem; border-radius: 8px; font-size: 0.8rem; display: none;"></pre>
  </div>

  <script>
    // ==========================================
    // 1. CONFIGURATION
    // ==========================================
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
    const API_URL = "https://script.google.com/macros/s/AKfycbyc-0PNFHKii8B1kAPDoAzXSSTeB6qcyv0k73OoLbwExvjFHiWsmyUlEfE4kmzoDw/exec"; 
    
    let html5QrCode;
    let isProcessing = false;

    // ==========================================
    // 2. INITIALISATION
    // ==========================================
    document.addEventListener("DOMContentLoaded", async () => {
      await loadWaypoints();

      // We no longer start the scanner automatically.
      // Instead, we bind it to the button tap.
      document.getElementById('start-btn').addEventListener('click', initialiseScanner);
      document.getElementById('diag-btn').addEventListener('click', runDiagnostics);
    });

    async function runDiagnostics() {
      const out = document.getElementById('diag-out');
      out.style.display = 'block';
      const lines = [];
      const log = (s) => { lines.push(s); out.textContent = lines.join('\n'); };

      log('— Environment —');
      log('URL: ' + location.href);
      log('isSecureContext: ' + window.isSecureContext);
      log('userAgent: ' + navigator.userAgent);
      log('mediaDevices present: ' + !!navigator.mediaDevices);
      log('getUserMedia present: ' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
      log('inIframe: ' + (window.self !== window.top));

      log('\n— Permissions API —');
      try {
        const p = await navigator.permissions.query({ name: 'camera' });
        log('camera permission state: ' + p.state);
      } catch (e) {
        log('permissions.query failed: ' + e.name + ' — ' + e.message);
      }

      log('\n— enumerateDevices (labels empty until granted) —');
      try {
        const devs = await navigator.mediaDevices.enumerateDevices();
        const cams = devs.filter(d => d.kind === 'videoinput');
        log('videoinput count: ' + cams.length);
        cams.forEach((c, i) => log(`  [${i}] label="${c.label}" id=${c.deviceId.slice(0,8)}…`));
      } catch (e) {
        log('enumerateDevices failed: ' + e.name + ' — ' + e.message);
      }

      log('\n— Test 1: getUserMedia({video: true}) —');
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        log('OK — got stream with ' + s.getVideoTracks().length + ' track(s)');
        s.getVideoTracks().forEach(t => log('  track: ' + t.label));
        s.getTracks().forEach(t => t.stop());
      } catch (e) {
        log('FAILED: ' + e.name + ' — ' + e.message);
      }

      log('\n— Test 2: getUserMedia({video:{facingMode:"environment"}}) —');
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
        log('OK — got stream with ' + s.getVideoTracks().length + ' track(s)');
        s.getVideoTracks().forEach(t => log('  track: ' + t.label));
        s.getTracks().forEach(t => t.stop());
      } catch (e) {
        log('FAILED: ' + e.name + ' — ' + e.message);
      }

      log('\nDone.');
    }

    async function loadWaypoints() {
      const select = document.getElementById('waypoint');
      try {
        const response = await fetch(`${API_URL}?action=getWaypoints`);
        const json = await response.json();
        
        if (json.status === 'success') {
          select.innerHTML = '<option value="" disabled selected>Choose a waypoint...</option>';
          json.data.forEach(wp => {
            const option = document.createElement('option');
            option.value = wp;
            option.textContent = wp;
            select.appendChild(option);
          });
          
          const savedWaypoint = localStorage.getItem('selectedWaypoint');
          if (savedWaypoint) {
            select.value = savedWaypoint;
          }
        }
      } catch (error) {
        select.innerHTML = '<option value="">Error loading waypoints</option>';
      }

      select.addEventListener('change', (e) => {
        localStorage.setItem('selectedWaypoint', e.target.value);
      });
    }

    function initialiseScanner() {
      // Hide the button once tapped
      document.getElementById('start-btn').style.display = 'none';
      
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 250 } };
      
      // Start the back camera
      html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
          alert("Camera Error: " + explainCameraError(err));
          document.getElementById('start-btn').style.display = 'block';
        });
    }

    function explainCameraError(err) {
      const name = (err && err.name) || '';
      const msg = (err && err.message) || String(err);

      if (!window.isSecureContext) {
        return "Page is not served over HTTPS. Camera access requires https:// (or localhost). Check the address bar.";
      }
      if (name === 'NotAllowedError' || /Permission denied/i.test(msg)) {
        return "Camera permission is blocked for this site.\n\n" +
               "Fix on Android Chrome:\n" +
               "1. Tap the lock/tune icon left of the URL\n" +
               "2. Tap Permissions (or Site settings)\n" +
               "3. If Camera is listed → set to Allow\n" +
               "   If Camera is NOT listed → tap 'Reset permissions' / 'Clear & reset' at the bottom\n" +
               "4. Close the tab, reopen the URL, and tap the scanner button again\n\n" +
               "Raw: " + msg;
      }
      if (name === 'NotFoundError' || name === 'OverconstrainedError') {
        return "No suitable back camera found on this device.\n\nRaw: " + msg;
      }
      if (name === 'NotReadableError') {
        return "Camera is in use by another app. Close other camera apps and retry.\n\nRaw: " + msg;
      }
      return msg;
    }

    // ==========================================
    // 3. CORE LOGIC
    // ==========================================
    async function onScanSuccess(decodedText, decodedResult) {
      if (isProcessing) return;
      
      const waypoint = document.getElementById('waypoint').value;
      if (!waypoint) {
        alert("Please select a waypoint first!");
        return;
      }

      isProcessing = true;
      html5QrCode.pause();
      showLoading(true);

      try {
        const coords = await getLocationWithTimeout(3000);
        
        const payload = {
          participantId: decodedText,
          waypoint: waypoint,
          latitude: coords.lat,
          longitude: coords.lng,
          timestamp: new Date().toISOString()
        };

        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === 'success') {
          showNotification(result.name);
        } else {
          alert(`Error: ${result.message}`);
        }

      } catch (error) {
        alert("Network error. Please try again.");
      } finally {
        showLoading(false);
        setTimeout(() => {
          isProcessing = false;
          html5QrCode.resume();
        }, 1500);
      }
    }

    function showLoading(on) {
      document.getElementById('loading').classList.toggle('show', on);
    }

    // ==========================================
    // 4. UTILITIES
    // ==========================================
    function showNotification(name) {
      const notif = document.getElementById('notification');
      document.getElementById('notif-name').textContent = name;
      notif.classList.add('show');
      
      setTimeout(() => {
        notif.classList.remove('show');
      }, 3000);
    }

    function getLocationWithTimeout(timeoutMs) {
      return new Promise((resolve) => {
        let timeoutId;
        const defaultCoords = { lat: "N/A", lng: "N/A" };

        if (!navigator.geolocation) {
          return resolve(defaultCoords);
        }

        timeoutId = setTimeout(() => resolve(defaultCoords), timeoutMs);

        navigator.geolocation.getCurrentPosition(
          (position) => {
            clearTimeout(timeoutId);
            resolve({ lat: position.coords.latitude, lng: position.coords.longitude });
          },
          (error) => {
            clearTimeout(timeoutId);
            resolve(defaultCoords);
          },
          { enableHighAccuracy: false, maximumAge: 60000, timeout: timeoutMs }
        );
      });
    }
  </script>
</body>
</html>
