<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Scanner</title>
  <!-- Import the HTML5 QR Code library -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --bg: #f8fafc;
      --text: #1e293b;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .header {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    select {
      padding: 1rem;
      font-size: 1.1rem;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      background-color: white;
      width: 100%;
    }
    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    /* Customising the injected scanner UI */
    #reader button {
      padding: 10px 15px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      margin-top: 10px;
    }
    /* Notification Overlay */
    #notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--success);
      color: white;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.2rem;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 1000;
    }
    #notification.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="notification">✅ Checked in: <span id="notif-name"></span></div>

  <div class="container">
    <div class="header">
      <h2>Marshal Scanner</h2>
    </div>

    <div class="control-group">
      <label for="waypoint">Select Waypoint:</label>
      <select id="waypoint">
        <option value="">Loading waypoints...</option>
      </select>
    </div>

    <!-- NEW: A dedicated button to request permissions -->
    <button id="start-btn" style="padding: 15px; font-size: 1.2rem; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold;">
      📷 Tap to Start Scanner
    </button>

    <div id="reader"></div>
  </div>

  <script>
    // ==========================================
    // 1. CONFIGURATION
    // ==========================================
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
    const API_URL = "https://script.google.com/macros/s/AKfycbyc-0PNFHKii8B1kAPDoAzXSSTeB6qcyv0k73OoLbwExvjFHiWsmyUlEfE4kmzoDw/exec"; 
    
    let html5QrCode;
    let isProcessing = false;

    // ==========================================
    // 2. INITIALISATION
    // ==========================================
    document.addEventListener("DOMContentLoaded", async () => {
      await loadWaypoints();
      
      // We no longer start the scanner automatically.
      // Instead, we bind it to the button tap.
      document.getElementById('start-btn').addEventListener('click', initialiseScanner);
    });

    async function loadWaypoints() {
      const select = document.getElementById('waypoint');
      try {
        const response = await fetch(`${API_URL}?action=getWaypoints`);
        const json = await response.json();
        
        if (json.status === 'success') {
          select.innerHTML = '<option value="" disabled selected>Choose a waypoint...</option>';
          json.data.forEach(wp => {
            const option = document.createElement('option');
            option.value = wp;
            option.textContent = wp;
            select.appendChild(option);
          });
          
          const savedWaypoint = localStorage.getItem('selectedWaypoint');
          if (savedWaypoint) {
            select.value = savedWaypoint;
          }
        }
      } catch (error) {
        select.innerHTML = '<option value="">Error loading waypoints</option>';
      }

      select.addEventListener('change', (e) => {
        localStorage.setItem('selectedWaypoint', e.target.value);
      });
    }

    function initialiseScanner() {
      // Hide the button once tapped
      document.getElementById('start-btn').style.display = 'none';
      
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 250 } };
      
      // Start the back camera
      html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
          // NEW: This will pop up on your phone screen if it fails,
          // telling us exactly why the browser blocked it.
          alert("Camera Error: " + err);
          document.getElementById('start-btn').style.display = 'block'; // Show button again
        });
    }

    // ==========================================
    // 3. CORE LOGIC
    // ==========================================
    async function onScanSuccess(decodedText, decodedResult) {
      if (isProcessing) return;
      
      const waypoint = document.getElementById('waypoint').value;
      if (!waypoint) {
        alert("Please select a waypoint first!");
        return;
      }

      isProcessing = true;
      html5QrCode.pause(); 

      try {
        const coords = await getLocationWithTimeout(3000);
        
        const payload = {
          participantId: decodedText,
          waypoint: waypoint,
          latitude: coords.lat,
          longitude: coords.lng,
          timestamp: new Date().toISOString()
        };

        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === 'success') {
          showNotification(result.name);
        } else {
          alert(`Error: ${result.message}`);
        }

      } catch (error) {
        alert("Network error. Please try again.");
      } finally {
        setTimeout(() => {
          isProcessing = false;
          html5QrCode.resume();
        }, 1500); 
      }
    }

    // ==========================================
    // 4. UTILITIES
    // ==========================================
    function showNotification(name) {
      const notif = document.getElementById('notification');
      document.getElementById('notif-name').textContent = name;
      notif.classList.add('show');
      
      setTimeout(() => {
        notif.classList.remove('show');
      }, 3000);
    }

    function getLocationWithTimeout(timeoutMs) {
      return new Promise((resolve) => {
        let timeoutId;
        const defaultCoords = { lat: "N/A", lng: "N/A" };

        if (!navigator.geolocation) {
          return resolve(defaultCoords);
        }

        timeoutId = setTimeout(() => resolve(defaultCoords), timeoutMs);

        navigator.geolocation.getCurrentPosition(
          (position) => {
            clearTimeout(timeoutId);
            resolve({ lat: position.coords.latitude, lng: position.coords.longitude });
          },
          (error) => {
            clearTimeout(timeoutId);
            resolve(defaultCoords);
          },
          { enableHighAccuracy: false, maximumAge: 60000, timeout: timeoutMs }
        );
      });
    }
  </script>
</body>
</html>
